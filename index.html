<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Reports</title>
<style>
  :root { --slate:#1e293b; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --bg:#f8fafc; --card:#fff; --blue:#2563eb; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--ink); background:var(--bg); }
  .accent { height:6px; background:var(--slate); }
  header { background:#fff; border-bottom:1px solid var(--line); padding:24px 20px; }
  .wrap { max-width:920px; margin:0 auto; }
  h1 { margin:0 0 4px; font-size:22px; }
  .sub { color:var(--muted); font-size:14px; }
  .controls { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:18px auto 0; max-width:920px; padding:0 20px; }
  #q { flex:1; min-width:200px; padding:9px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; }
  .filters { display:flex; gap:6px; flex-wrap:wrap; }
  .filters button { border:1px solid var(--line); background:#fff; color:var(--ink); padding:8px 12px; border-radius:8px; font-size:13px; cursor:pointer; }
  .filters button.on { background:var(--slate); color:#fff; border-color:var(--slate); }
  main { max-width:920px; margin:18px auto 60px; padding:0 20px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .card .t { font-weight:600; font-size:15px; }
  .card .t a { color:var(--ink); text-decoration:none; }
  .card .t a:hover { color:var(--blue); }
  .card .m { color:var(--muted); font-size:12px; margin-top:3px; }
  .badge { display:inline-block; font-size:11px; padding:2px 8px; border-radius:999px; background:#eef2ff; color:#3730a3; margin-left:8px; vertical-align:middle; }
  .badge.winners { background:#ecfdf5; color:#065f46; }
  .badge.angles { background:#fef3c7; color:#92400e; }
  .empty { color:var(--muted); text-align:center; padding:40px 0; }
</style>
</head>
<body>
<div class="accent"></div>
<header><div class="wrap"><h1>Agent Reports</h1></div></header>
<div class="controls">
  <input id="q" type="search" placeholder="Filter by title...">
  <div class="filters" id="filters">
    <button data-type="all" class="on">All</button>
    <button data-type="winners">Winners</button>
    <button data-type="angles">Angles</button>
    <button data-type="other">Other</button>
  </div>
</div>
<main id="list"><div class="empty">Loading...</div></main>
<script>
  let REPORTS = [], typeFilter = "all";
  const list = document.getElementById("list"), q = document.getElementById("q");
  function render() {
    const term = q.value.trim().toLowerCase();
    const rows = REPORTS.filter(r =>
      (typeFilter === "all" || (r.type || "other") === typeFilter) &&
      (!term || (r.title || "").toLowerCase().includes(term)));
    if (!rows.length) { list.innerHTML = '<div class="empty">No reports match.</div>'; return; }
    list.innerHTML = rows.map(r => {
      const ty = (r.type || "other");
      return '<div class="card"><div><div class="t"><a href="' + esc(r.file) + '">' + esc(r.title || r.file) + '</a>' +
        '<span class="badge ' + ty + '">' + ty + '</span></div><div class="m">' +
        esc(r.date || "") + '</div></div></div>';
    }).join("");
  }
  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  document.getElementById("filters").addEventListener("click", e => {
    if (e.target.tagName !== "BUTTON") return;
    typeFilter = e.target.dataset.type;
    [...e.currentTarget.children].forEach(b => b.classList.toggle("on", b === e.target));
    render();
  });
  q.addEventListener("input", render);
  fetch("manifest.json").then(r => r.json())
    .then(d => { REPORTS = d.reports || []; render(); })
    .catch(() => { list.innerHTML = '<div class="empty">No manifest yet.</div>'; });
</script>
</body>
</html>
